name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.6.1.stable"
          mkdir -p "$TEMPLATES_DIR"
          cp /root/.local/share/godot/export_templates/4.6.1.stable/* "$TEMPLATES_DIR/" 2>/dev/null || true
          mkdir -p builds/web

      - name: Write export preset
        run: |
          python3 -c "
          lines = [
            '[preset.0]', '',
            'name=\"Web\"',
            'platform=\"Web\"',
            'runnable=true',
            'dedicated_server=false',
            'custom_features=\"\"',
            'export_filter=\"all_resources\"',
            'include_filter=\"\"',
            'exclude_filter=\"\"',
            'export_path=\"builds/web/index.html\"',
            'encryption_include_filters=\"\"',
            'encryption_exclude_filters=\"\"',
            'encrypt_pck=false',
            'encrypt_directory=false',
            'script_export_mode=2', '',
            '[preset.0.options]', '',
            'custom_template/debug=\"\"',
            'custom_template/release=\"\"',
            'variant/extensions_support=false',
            'variant/thread_support=false',
            'vram_texture_compression/for_desktop=true',
            'vram_texture_compression/for_mobile=true',
            'html/export_icon=true',
            'html/custom_html_shell=\"\"',
            'html/head_include=\"\"',
            'html/canvas_resize_policy=2',
            'html/focus_canvas_on_start=true',
            'html/experimental_virtual_keyboard=false',
            'progressive_web_app/enabled=false',
          ]
          with open('export_presets.cfg', 'w') as f:
            f.write('\n'.join(lines) + '\n')
          "

      - name: Export to Web
        run: godot --headless -v --export-release "Web" builds/web/index.html 2>&1; ls -la builds/web/

      - name: Verify export
        run: test -f builds/web/index.html || exit 1

      - name: Add coi-serviceworker
        run: |
          cd builds/web
          wget -q https://raw.githubusercontent.com/niccokunzmann/coi-serviceworker/main/coi-serviceworker.min.js -O coi-serviceworker.min.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.min.js"></script>|' index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

  deploy:
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
