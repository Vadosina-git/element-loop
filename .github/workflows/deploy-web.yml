name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.6.1.stable"
          mkdir -p "$TEMPLATES_DIR"
          cp /root/.local/share/godot/export_templates/4.6.1.stable/* "$TEMPLATES_DIR/" 2>/dev/null || true
          ls -la "$TEMPLATES_DIR/" | head -5

      - name: Debug - list preset and check
        run: |
          cat export_presets.cfg
          echo "---"
          godot --headless --quit 2>&1 || true

      - name: Export to Web
        run: |
          mkdir -p builds/web
          godot --headless -v --export-release "Web" builds/web/index.html 2>&1 || true
          echo "--- Build dir contents ---"
          ls -la builds/web/ || true

      - name: Check if export succeeded
        run: |
          if [ ! -f builds/web/index.html ]; then
            echo "Export failed - trying with debug export"
            godot --headless -v --export-debug "Web" builds/web/index.html 2>&1 || true
          fi
          if [ ! -f builds/web/index.html ]; then
            echo "FATAL: Export failed"
            exit 1
          fi

      - name: Add coi-serviceworker for SharedArrayBuffer
        run: |
          cd builds/web
          wget -q https://raw.githubusercontent.com/niccokunzmann/coi-serviceworker/main/coi-serviceworker.min.js -O coi-serviceworker.min.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.min.js"></script>|' index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

  deploy:
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
